<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Update Order - Helok Clothing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/feather-icons"></script>
    <style>
        .selected-purple {
            border-color: #60327C !important;
            color: #60327C !important;
            background-color: #fdfbff;
            font-weight: bold;
        }
    </style>
</head>
<body class="bg-black/80 flex items-center justify-center min-h-screen p-6 font-sans">

    <div class="bg-white w-full max-w-lg rounded-[2rem] shadow-2xl overflow-hidden p-8 relative">
        <a href="cart.html" class="absolute right-8 top-8 text-gray-400 hover:text-gray-600 transition-colors">
            <i data-feather="x" class="w-6 h-6"></i>
        </a>

        <h1 class="text-2xl font-bold text-[#1a3a4a] mb-8">Edit Order Details</h1>

        <div class="space-y-8">
            <div>
                <label class="block text-sm font-bold text-gray-800 mb-3">Size</label>
                <div id="size-group" class="flex flex-wrap gap-2">
                    <button type="button" class="w-12 h-10 border rounded-lg text-gray-400">XS</button>
                    <button type="button" class="w-12 h-10 border rounded-lg text-gray-400">S</button>
                    <button type="button" class="w-12 h-10 border rounded-lg text-gray-400">M</button>
                    <button type="button" class="w-12 h-10 border rounded-lg text-gray-400">L</button>
                    <button type="button" class="w-12 h-10 border rounded-lg text-gray-400">XL</button>
                    <button type="button" class="w-12 h-10 border rounded-lg text-gray-400">2XL</button>
                    <button type="button" class="w-12 h-10 border rounded-lg text-gray-400">3XL</button>
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-800 mb-3">Sleeve Type</label>
                <div id="sleeve-group" class="grid grid-cols-2 gap-3">
                    <button type="button" class="py-3 border rounded-xl text-gray-400">Short Sleeve</button>
                    <button type="button" class="py-3 border rounded-xl text-gray-400">Long Sleeve</button>
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-800 mb-3">Collar Type</label>
                <div id="collar-group" class="grid grid-cols-2 gap-3">
                    <button type="button" class="py-3 border rounded-xl text-gray-400">V-Neck</button>
                    <button type="button" class="py-3 border rounded-xl text-gray-400">Round Neck</button>
                </div>
            </div>

            <div class="flex gap-4 pt-4">
                <button onclick="window.location.href='cart.html'" 
                   class="flex-1 bg-slate-200 text-gray-600 py-4 rounded-2xl font-bold hover:bg-slate-300">
                    Cancel
                </button>
                
                <button type="button" onclick="saveChanges()" 
                   class="flex-1 bg-[#60327C] text-white py-4 rounded-2xl font-bold hover:bg-[#4d2863] shadow-md">
                    Save Changes
                </button>
            </div>
        </div>
    </div>

    <script>
        // 1. Get current data immediately
        let currentItem = JSON.parse(localStorage.getItem('cartItem')) || {};

        // 2. Setup Selection Logic
        function setupGroup(groupId, currentKey) {
            const container = document.getElementById(groupId);
            if (!container) return;
            const buttons = container.querySelectorAll('button');

            buttons.forEach(btn => {
                // Pre-select based on existing cart data
                if (btn.innerText === currentItem[currentKey]) {
                    btn.classList.add('selected-purple');
                    btn.classList.remove('text-gray-400');
                }

                btn.addEventListener('click', () => {
                    buttons.forEach(b => {
                        b.classList.remove('selected-purple');
                        b.classList.add('text-gray-400');
                    });
                    btn.classList.add('selected-purple');
                    btn.classList.remove('text-gray-400');
                    
                    // Update the temporary object
                    currentItem[currentKey] = btn.innerText;
                });
            });
        }

        // Initialize UI
        setupGroup('size-group', 'size');
        setupGroup('sleeve-group', 'sleeve');
        setupGroup('collar-group', 'collar');

        // 3. The Save Function
        function saveChanges() {
            try {
                // Save the updated object back to localStorage
                localStorage.setItem('cartItem', JSON.stringify(currentItem));
                // Force navigation
                window.location.replace('cart.html');
            } catch (e) {
                console.error("Error saving to localStorage", e);
                alert("Failed to save changes. Please try again.");
            }
        }

        feather.replace();
    </script>
</body>
</html>
