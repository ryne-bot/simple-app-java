<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - Helok Clothing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/feather-icons"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .sidebar-active { background-color: rgba(255, 255, 255, 0.2); border-radius: 0.75rem; }
    </style>
</head>
<body class="bg-[#B0E6E6] flex h-screen overflow-hidden">

    <aside class="w-64 bg-[#60327C] text-white flex flex-col shrink-0 shadow-xl">
        <div class="p-8 text-center">
            <div class="bg-white text-black w-12 h-12 mx-auto flex items-center justify-center text-3xl font-black rounded-md">H</div>
            <p class="text-[10px] tracking-[0.2em] font-bold mt-2 uppercase">Helok Clothing</p>
        </div>
        <nav class="flex-1 px-4 space-y-1">
            <a href="customerHome.html" class="flex items-center px-4 py-3 hover:bg-white/10 rounded-xl transition-all">
                <i data-feather="home" class="w-5 h-5 mr-4"></i>
                <span class="font-medium text-sm">Home</span>
            </a>
            <a href="product.html" class="flex items-center px-4 py-3 hover:bg-white/10 rounded-xl transition-all">
                <i data-feather="grid" class="w-5 h-5 mr-4"></i>
                <span class="font-medium text-sm">Browse Products</span>
            </a>
            <a href="cart.html" class="flex items-center px-4 py-3 hover:bg-white/10 rounded-xl transition-all">
                <i data-feather="shopping-cart" class="w-5 h-5 mr-4"></i>
                <span class="font-medium text-sm">Shopping Cart</span>
            </a>
            <a href="MyOrders.html" class="sidebar-active flex items-center px-4 py-3 transition-all">
                <i data-feather="truck" class="w-5 h-5 mr-4"></i>
                <span class="font-medium text-sm">My Orders</span>
            </a>
            <a href="customerProfile.html" class="flex items-center px-4 py-3 hover:bg-white/10 rounded-xl transition-all">
                <i data-feather="user" class="w-5 h-5 mr-4"></i>
                <span class="font-medium text-sm">My Profile</span>
            </a>
        </nav>
        <div class="p-6 border-t border-white/10">
            <a href="CustLogin.html" class="flex items-center px-4 py-3 hover:bg-white/10 rounded-xl transition-all">
                <i data-feather="log-out" class="w-5 h-5 mr-4"></i>
                <span class="font-medium text-sm">Logout</span>
            </a>
        </div>
    </aside>

    <main class="flex-1 flex flex-col p-10 overflow-y-auto">
        <div class="mb-8">
            <h1 class="text-4xl font-bold text-gray-900 mb-2">My Orders</h1>
            <p class="text-gray-600">Track and manage your clothing orders</p>
        </div>

        <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-gray-50 border-b border-gray-100">
                    <tr>
                        <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase">Order ID</th>
                        <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase">Design</th>
                        <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase text-center">Qty</th>
                        <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase">Status</th>
                        <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase">Total</th>
                        <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase text-center">Actions</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-100">
                    <tr class="hover:bg-gray-50/50 transition-colors">
                        <td class="px-6 py-6">
                            <span class="font-bold text-gray-900">#HK-8821</span>
                            <p class="text-[10px] text-gray-400">May 14, 2026</p>
                        </td>
                        <td class="px-6 py-6">
                            <div class="flex items-center">
                                <img src="image/jersey2.jpg" alt="Design" class="w-12 h-12 rounded-lg object-cover mr-3">
                                <span class="text-sm font-semibold text-gray-700">IKM UDE Jersey</span>
                            </div>
                        </td>
                        <td class="px-6 py-6 text-center text-sm font-medium text-gray-600">1</td>
                        <td class="px-6 py-6">
                            <span class="px-3 py-1 bg-blue-100 text-blue-700 rounded-full text-[10px] font-black uppercase">Processing</span>
                        </td>
                        <td class="px-6 py-6 font-bold text-[#60327C]">RM55.99</td>
                        <td class="px-6 py-6">
                            <div class="flex items-center justify-center gap-3">
                                <button onclick="window.location.href='orderDetails.html'" class="w-28 py-1.5 bg-[#60327C] text-white text-[11px] font-bold rounded-lg hover:bg-[#4d2863] transition-all">
                                    View Details
                                </button>
                             
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <script>
        feather.replace();
    </script>
</body>
</html>
