<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Customer Account</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background-color: #B0E6E6; /* Teal background from image */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navbar with Back Link */
        .navbar {
            padding: 20px 40px;
        }

        .back-link {
            text-decoration: none;
            color: #4b5563;
            font-size: 14px;
            display: flex;
            align-items: center;
        }

        /* Main Container */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .header-text {
            text-align: center;
            margin-bottom: 25px;
        }

        .header-text h1 {
            font-size: 28px;
            font-weight: 700;
            color: #111827;
            margin-bottom: 5px;
        }

        .header-text p {
            color: #4b5563;
            font-size: 14px;
        }

        /* Registration Card */
        .register-card {
            background-color: white;
            width: 100%;
            max-width: 650px;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        /* Form Grid Layout */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .full-width {
            grid-column: span 2;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }

        .form-group input:focus {
            border-color: #2563eb;
        }

        /* Buttons Section */
        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-cancel {
            background-color: #6b7280; /* Grey color from image */
            color: white;
        }

        .btn-register {
            background-color: #1d4ed8; /* Blue color from image */
            color: white;
        }

        .btn:hover {
            opacity: 0.9;
        }

        /* Footer */
        .card-footer {
            text-align: center;
            margin-top: 25px;
            font-size: 14px;
            color: #4b5563;
        }

        .card-footer a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <a href="CustLogin.html" class="back-link">&larr; Back to Login</a>
    </div>

    <div class="main-content">
        <div class="header-text">
            <h1>Create Customer Account</h1>
            <p>Join Helok Clothing today</p>
        </div>

        <div class="register-card">
            <form action="RegisterServlet" method="POST">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" name="fullName" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" name="email" required>
                    </div>

                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="text" name="phone">
                    </div>
                    <div class="form-group">
                        <label>Identification Card</label>
                        <input type="text" name="ic">
                    </div>

                    <div class="form-group full-width">
                        <label>Address</label>
                        <input type="text" name="address">
                    </div>

                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" name="password" placeholder="........" required>
                    </div>
                    <div class="form-group">
                        <label>Confirm Password</label>
                        <input type="password" name="confirmPassword" placeholder="........" required>
                    </div>
                </div>

            <div class="button-group">
    			<button type="button" class="btn btn-cancel" onclick="window.location.href='CustLogin.html'">Cancel</button>
    
    			<button type="submit" class="btn btn-register" onclick="alert('Registration Successful!'); window.location.href='CustLogin.html'; return false;">Register</button>
			</div>
            </form>

            <div class="card-footer">
                Already have an account? <a href="CustLogin.html">Sign In</a>
            </div>
        </div>
    </div>

</body>
</html>
