<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Helok Clothing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/feather-icons"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        
        /* Matches your exact active pill shape from product.html and cart.html */
        .sidebar-active {
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 0 50px 50px 0;
            margin-right: 1.5rem;
        }
    </style>
</head>
<body class="bg-[#B0E6E6] flex h-screen overflow-hidden">

    <aside class="w-64 bg-[#60327C] text-white flex flex-col shrink-0 shadow-xl">
        <div class="p-8 text-center">
            <div class="bg-white text-black w-12 h-12 mx-auto flex items-center justify-center text-3xl font-black rounded-md">H</div>
            <p class="text-[10px] tracking-[0.2em] font-bold mt-2 uppercase">Helok Clothing</p>
        </div>

        <nav class="flex-1 px-4 space-y-2">
            <a href="customerHome.html" class="flex items-center px-4 py-3 hover:bg-white/10 rounded-xl transition-all">
                <i data-feather="home" class="w-5 h-5 mr-4"></i>
                <span class="font-medium text-sm">Home</span>
            </a>
            <a href="product.html" class="flex items-center px-4 py-3 hover:bg-white/10 rounded-xl transition-all">
                <i data-feather="grid" class="w-5 h-5 mr-4"></i>
                <span class="font-medium text-sm">Browse Products</span>
            </a>
            <a href="cart.html" class="flex items-center px-4 py-3 hover:bg-white/10 rounded-xl transition-all">
                <i data-feather="shopping-cart" class="w-5 h-5 mr-4"></i>
                <span class="font-medium text-sm">Shopping Cart</span>
            </a>
            <a href="MyOrders.html" class="flex items-center px-4 py-3 hover:bg-white/10 rounded-xl transition-all">
                <i data-feather="truck" class="w-5 h-5 mr-4"></i>
                <span class="font-medium text-sm">My Orders</span>
            </a>
            <a href="customerProfile.html" class="sidebar-active flex items-center px-4 py-3 transition-all">
                <i data-feather="user" class="w-5 h-5 mr-4"></i>
                <span class="font-medium text-sm">My Profile</span>
            </a>
        </nav>

        <div class="p-6 border-t border-white/10">
            <a href="CustLogin.html" class="flex items-center px-4 py-3 hover:bg-white/10 rounded-xl transition-all text-white/90">
                <i data-feather="log-out" class="w-5 h-5 mr-4"></i>
                <span class="font-medium text-sm">Logout</span>
            </a>
            <div class="mt-4 text-[10px] text-white/40 px-4">
                © 2026 Helok Clothing
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col p-10 overflow-y-auto">
        
        <div class="bg-[#60327C] p-8 rounded-2xl mb-8 flex flex-col space-y-2 shadow-lg">
            <a href="customerHome.html" class="flex items-center text-white/70 hover:text-white text-xs font-bold w-fit transition-all mb-2">
                <i data-feather="arrow-left" class="w-3 h-3 mr-2"></i> BACK TO HOME
            </a>
            <h1 class="text-3xl font-bold text-white">My Profile</h1>
            <p class="text-white/70 text-sm">Manage your account information and preferences</p>
        </div>

        <div class="bg-white rounded-[1.5rem] shadow-sm p-10 border border-black/5">
            
            <div class="flex justify-between items-center mb-10 pb-6 border-b border-gray-100">
                <div>
                    <h2 class="text-2xl font-bold text-gray-900">Anis</h2>
                    <p class="text-gray-400 text-sm font-medium">anis@gmail.com</p>
                </div>
                <button id="editBtn" onclick="toggleEditMode(true)" class="bg-[#60327C] text-white px-6 py-2.5 rounded-xl font-bold hover:bg-[#4d2863] transition-all flex items-center text-sm shadow-md">
                    <i data-feather="edit-2" class="w-4 h-4 mr-2"></i> Edit Profile
                </button>
            </div>

            <form class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Customer ID</label>
                        <div class="bg-gray-50 border border-gray-100 rounded-xl px-4 py-3 text-gray-500 font-mono text-sm">
                            CUST001
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Full Name</label>
                        <input type="text" value="Anis" class="editable-field w-full px-4 py-3 border border-gray-100 rounded-xl bg-gray-50 text-gray-600 text-sm outline-none cursor-not-allowed" readonly />
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Email Address</label>
                        <input type="email" value="anis@gmail.com" class="editable-field w-full px-4 py-3 border border-gray-100 rounded-xl bg-gray-50 text-gray-600 text-sm outline-none cursor-not-allowed" readonly />
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Phone Number</label>
                        <input type="text" value="+60 12-345 6789" class="editable-field w-full px-4 py-3 border border-gray-100 rounded-xl bg-gray-50 text-gray-600 text-sm outline-none cursor-not-allowed" readonly />
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Delivery Address</label>
                    <textarea rows="3" class="editable-field w-full px-4 py-3 border border-gray-100 rounded-xl bg-gray-50 text-gray-600 text-sm outline-none cursor-not-allowed" readonly>No 12, Jalan Merlimau, 77300 Merlimau, Melaka Malaysia</textarea>
                </div>

                <div id="actionButtons" class="pt-6 flex justify-end gap-3 hidden">
                    <button type="button" onclick="toggleEditMode(false)" class="px-6 py-2.5 rounded-xl font-bold text-gray-400 hover:text-gray-600 text-sm transition-all">
                        Cancel
                    </button>
                    <button type="button" onclick="saveProfile()" class="bg-green-600 text-white px-8 py-2.5 rounded-xl font-bold hover:bg-green-700 transition-all text-sm shadow-lg flex items-center">
                        <i data-feather="check" class="w-4 h-4 mr-2"></i> Save Changes
                    </button>
                </div>
            </form>
        </div>
    </main>

    <script>
        feather.replace();

        function toggleEditMode(isEditing) {
            const editableFields = document.querySelectorAll('.editable-field');
            const editBtn = document.getElementById('editBtn');
            const actionButtons = document.getElementById('actionButtons');

            editableFields.forEach(field => {
                if (isEditing) {
                    field.removeAttribute('readonly');
                    field.classList.remove('bg-gray-50', 'text-gray-600', 'cursor-not-allowed');
                    field.classList.add('bg-white', 'text-gray-900', 'border-gray-300', 'ring-2', 'ring-[#60327C]/10');
                } else {
                    field.setAttribute('readonly', 'true');
                    field.classList.add('bg-gray-50', 'text-gray-600', 'cursor-not-allowed');
                    field.classList.remove('bg-white', 'text-gray-900', 'border-gray-300', 'ring-2', 'ring-[#60327C]/10');
                }
            });

            if (isEditing) {
                editBtn.classList.add('hidden');
                actionButtons.classList.remove('hidden');
            } else {
                editBtn.classList.remove('hidden');
                actionButtons.classList.add('hidden');
            }
        }

        function saveProfile() {
            alert('Profile Updated Successfully!');
            toggleEditMode(false);
        }
    </script>
</body>
</html>
