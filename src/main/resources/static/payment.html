<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment - Helok Clothing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/feather-icons"></script>
</head>
<body class="min-h-screen bg-[#B0E6E6] flex font-sans">

    <div class="fixed inset-y-0 left-0 w-64 bg-gradient-to-b from-[#60327C] to-[#8b4fa8] text-white flex flex-col z-20 shadow-xl">
        <div class="p-6">
            <img src="assets/helokLogo.png" alt="Helok Logo" class="h-10 w-auto bg-white/10 p-2 rounded-lg mb-8" onerror="this.src='https://via.placeholder.com/150x50?text=Helok+Logo'" />
            <nav class="space-y-2">
                <a href="customerHome.html" class="flex items-center space-x-3 px-4 py-3 rounded-lg hover:bg-white/15 transition-all">
                    <i data-feather="home" class="w-5 h-5"></i><span>Home</span>
                </a>
                <a href="product.html" class="flex items-center space-x-3 px-4 py-3 rounded-lg hover:bg-white/15 transition-all">
                    <i data-feather="package" class="w-5 h-5"></i><span>Products</span>
                </a>
                <a href="cart.html" class="flex items-center space-x-3 px-4 py-3 rounded-lg bg-white/25 font-medium transition-all">
                    <i data-feather="shopping-cart" class="w-5 h-5"></i><span>Shopping Cart</span>
                </a>
                <a href="customerProfile.html" class="flex items-center space-x-3 px-4 py-3 rounded-lg hover:bg-white/15 transition-all">
                    <i data-feather="user" class="w-5 h-5"></i><span>Profile</span>
                </a>
            </nav>
        </div>
        
        <div class="mt-auto p-4 border-t border-white/10">
            <button onclick="window.location.href='home.html'" class="w-full flex items-center space-x-3 px-4 py-3 rounded-lg hover:bg-white/15 transition-all">
                <i data-feather="log-out" class="w-5 h-5"></i><span>Logout</span>
            </button>
        </div>
    </div> <div class="flex-1 ml-64 p-8">
        <div class="max-w-3xl mx-auto">
            
            <button onclick="window.location.href='cart.html'" class="flex items-center text-gray-700 hover:text-[#60327C] font-semibold bg-white px-4 py-2 rounded-lg shadow-sm mb-6 w-max">
                <i data-feather="arrow-left" class="w-5 h-5 mr-2"></i> Back to Cart
            </button>

            <div id="paymentForm" class="bg-white rounded-xl shadow-md overflow-hidden">
                <div class="p-8">
                    <h2 class="text-2xl font-bold text-gray-900 mb-6">Complete Your Payment</h2>
                    
                    <div class="bg-gray-50 rounded-lg p-6 mb-8 border border-gray-100 flex justify-between items-center">
                        <div>
                            <p class="text-sm text-gray-500 mb-1">Total Amount to Pay</p>
                            <p class="text-3xl font-bold text-[#60327C]">RM55.99</p>
                        </div>
                        <div class="text-right">
                            <p class="text-sm text-gray-500 mb-1">Order ID</p>
                            <p class="font-mono font-semibold text-gray-900">ORD-2026-X79A</p>
                        </div>
                    </div>

                    <div class="grid md:grid-cols-2 gap-8 mb-8">
                        <div class="text-center p-6 border-2 border-dashed border-gray-200 rounded-xl">
                            <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=Payment-HELOK" alt="Payment QR" class="mx-auto mb-4" />
                            <p class="text-sm text-gray-600 font-medium">Scan to pay via DuitNow / E-Wallet</p>
                        </div>

                        <div class="flex flex-col justify-center">
                            <label class="block text-sm font-semibold text-gray-700 mb-3">Upload Payment Receipt</label>
                            <label for="receiptUpload" class="cursor-pointer border-2 border-dashed border-gray-300 rounded-xl p-8 text-center hover:bg-gray-50 transition-colors">
                                <i data-feather="upload" class="w-8 h-8 mx-auto text-gray-400 mb-2"></i>
                                <p id="fileNameDisplay" class="text-gray-600">Click to upload receipt (PDF, JPG, PNG)</p>
                            </label>
                            <input type="file" id="receiptUpload" class="hidden" onchange="updateFileName(this)" accept="image/*,.pdf" />
                        </div>
                    </div>

                    <button onclick="submitPayment()" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold hover:bg-green-700 transition-colors shadow-lg">
                        Submit Payment Receipt
                    </button>
                </div>
            </div>

            <div id="successScreen" class="hidden bg-white rounded-xl shadow-md p-12 text-center">
                <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
                    <i data-feather="check" class="w-10 h-10 text-green-600"></i>
                </div>
                <h3 class="text-3xl font-bold text-gray-900 mb-4">Receipt Submitted!</h3>
                <p class="text-gray-600 mb-8">Thank you for your payment. We are verifying your receipt and will confirm your order shortly.</p>
                <button onclick="window.location.href='customerHome.html'" class="bg-[#60327C] text-white px-8 py-3 rounded-lg font-semibold hover:bg-[#4d2863]">
                    Return to Home
                </button>
            </div>

        </div>
    </div>

    <script>
        feather.replace();

        function updateFileName(input) {
            const display = document.getElementById('fileNameDisplay');
            if (input.files && input.files[0]) {
                display.textContent = input.files[0].name;
                display.classList.add('text-[#60327C]', 'font-semibold');
            }
        }

        function submitPayment() {
            // Hide form, show success screen
            document.getElementById('paymentForm').classList.add('hidden');
            document.getElementById('successScreen').classList.remove('hidden');
        }
    </script>
</body>
</html>
