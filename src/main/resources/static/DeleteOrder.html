<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Remove Order</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black/80 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white w-full max-w-md rounded-[2rem] p-10 shadow-2xl text-center">
        <div class="bg-red-50 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-6">
            <span class="text-red-500 text-2xl">🗑️</span>
        </div>
        
        <h1 class="text-xl font-bold mb-2">Remove from Cart?</h1>
        <p class="text-gray-400 text-sm mb-6">Are you sure you want to remove this item from your cart?</p>

        <div id="delete-preview" class="hidden bg-gray-50 rounded-2xl p-4 mb-8 flex items-center gap-4 text-left">
            <img id="prev-img" src="" class="w-16 h-16 rounded-lg object-cover">
            <div>
                <h3 id="prev-name" class="font-bold text-sm text-gray-800 leading-tight"></h3>
                <p class="text-[11px] text-gray-500 mt-1">Size: <span id="prev-size" class="font-bold"></span></p>
                <p class="text-[11px] text-gray-500">Qty: 1</p>
            </div>
        </div>

        <div class="flex gap-4">
            <button onclick="window.history.back()" class="flex-1 py-4 bg-gray-200 rounded-2xl font-bold text-gray-500 hover:bg-gray-300 transition-colors">Cancel</button>
            <button onclick="confirmDelete()" class="flex-1 py-4 bg-[#ff4d4d] rounded-2xl font-bold text-white hover:bg-red-600 transition-colors">Yes, Remove</button>
        </div>
    </div>

    <script>
        // Automatically load the item details so the user knows what they are deleting
        window.onload = function() {
            const data = localStorage.getItem('cartItem');
            if (data) {
                const item = JSON.parse(data);
                document.getElementById('delete-preview').classList.remove('hidden');
                document.getElementById('prev-img').src = item.image;
                document.getElementById('prev-name').innerText = item.name;
                document.getElementById('prev-size').innerText = item.size;
            }
        }

        function confirmDelete() {
            // Delete the memory
            localStorage.removeItem('cartItem');
            // Move back to cart.html which will now show as empty
            window.location.href = 'cart.html';
        }
    </script>
</body>
</html>
