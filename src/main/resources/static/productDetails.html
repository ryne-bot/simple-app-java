<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Detail - Helok Clothing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/feather-icons"></script>
</head>
<body class="min-h-screen bg-[#B0E6E6] flex font-sans">

    <aside class="w-64 bg-[#60327C] text-white flex flex-col shrink-0 shadow-xl fixed h-full">
        <div class="p-8 text-center">
            <div class="bg-white text-black w-12 h-12 mx-auto flex items-center justify-center text-3xl font-black rounded-md">H</div>
            <p class="text-[10px] tracking-[0.2em] font-bold mt-2 uppercase">HELOK CLOTHING</p>
        </div>

        <nav class="flex-1 px-4 space-y-2">
            <a href="customerHome.html" class="flex items-center px-4 py-3 hover:bg-white/10 rounded-xl transition-all">
                <i data-feather="home" class="w-5 h-5 mr-4"></i>
                <span class="font-medium text-sm">Home</span>
            </a>
            <a href="product.html" class="bg-white/10 flex items-center px-4 py-3 rounded-xl transition-all">
                <i data-feather="grid" class="w-5 h-5 mr-4"></i>
                <span class="font-medium text-sm">Browse Products</span>
            </a>
            <a href="cart.html" class="flex items-center px-4 py-3 hover:bg-white/10 rounded-xl transition-all">
                <i data-feather="shopping-cart" class="w-5 h-5 mr-4"></i>
                <span class="font-medium text-sm">Shopping Cart</span>
            </a>
            <a href="MyOrders.html" class="flex items-center px-4 py-3 hover:bg-white/10 rounded-xl transition-all">
                <i data-feather="truck" class="w-5 h-5 mr-4"></i>
                <span class="font-medium text-sm">My Orders</span>
            </a>
            <a href="customerProfile.html" class="flex items-center px-4 py-3 hover:bg-white/10 rounded-xl transition-all">
                <i data-feather="user" class="w-5 h-5 mr-4"></i>
                <span class="font-medium text-sm">My Profile</span>
            </a>
        </nav>

        <div class="p-6 border-t border-white/10">
            <a href="CustLogin.html" class="flex items-center px-4 py-3 hover:bg-white/10 rounded-xl transition-all text-white/90">
                <i data-feather="log-out" class="w-5 h-5 mr-4"></i>
                <span class="font-medium text-sm">Logout</span>
            </a>
        </div>
    </aside>

    <div class="flex-1 ml-64 p-8">
        <div class="max-w-6xl mx-auto">
            
            <button onclick="window.history.back()" class="flex items-center text-gray-700 hover:text-[#60327C] font-semibold bg-white px-4 py-2 rounded-lg shadow-sm mb-6 w-max">
                <i data-feather="arrow-left" class="w-5 h-5 mr-2"></i> Back to Products
            </button>

            <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
                <div class="grid md:grid-cols-2 gap-0">
                    
                    <div class="bg-gray-50 p-8 flex items-center justify-center border-r border-gray-100">
                        <img id="itemImg" src="image/jersey2.jpg" alt="Jersey" class="w-full max-w-md rounded-xl shadow-lg" />
                    </div>

                    <div class="p-8">
                        <h1 id="itemName" class="text-3xl font-bold text-gray-900 mb-2">IKM UDE Jersey</h1>
                        <p id="itemPrice" class="text-2xl font-bold text-[#60327C] mb-6">RM55.99</p>
                        
                        <div class="mb-6 pb-6 border-b border-gray-100">
                            <h3 class="text-sm font-semibold text-gray-900 mb-3">Description</h3>
                            <p class="text-gray-600 text-sm leading-relaxed">Premium team jersey with vibrant design. Perfect for team sports and casual wear.</p>
                        </div>

                        <div class="space-y-5">
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-sm font-semibold text-gray-700 mb-2">Size</label>
                                    <select id="itemSize" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#60327C] outline-none">
                                        <option value="S">S</option>
                                        <option value="M" selected>M</option>
                                        <option value="L">L</option>
                                        <option value="XL">XL</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-sm font-semibold text-gray-700 mb-2">Sleeve Type</label>
                                    <select id="itemSleeve" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#60327C] outline-none">
                                        <option value="Short Sleeve">Short Sleeve</option>
                                        <option value="Long Sleeve">Long Sleeve</option>
                                    </select>
                                </div>
                            </div>
                            
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-2">Collar Type</label>
                                <select id="itemCollar" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#60327C] outline-none">
                                    <option value="Collar">Collar</option>
                                    <option value="Non Collar">Non Collar</option>
                                </select>
                            </div>

                            <div class="pt-6 flex gap-4">
                                <button type="button" onclick="addToCartLogic()" class="flex-1 bg-white border-2 border-[#60327C] text-[#60327C] px-6 py-4 rounded-xl font-bold hover:bg-gray-50 transition-colors flex justify-center items-center cursor-pointer">
                                    <i data-feather="shopping-cart" class="mr-2 w-5 h-5"></i> Add to Cart
                                </button>
                                
                                <button type="button" onclick="window.location.href='payment.html'" class="flex-1 bg-[#60327C] text-white px-6 py-4 rounded-xl font-bold hover:bg-[#4d2863] transition-colors shadow-lg">
                                    Proceed to Payment
                                </button>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        feather.replace();

        function addToCartLogic() {
            const productData = {
                name: document.getElementById('itemName').innerText,
                price: document.getElementById('itemPrice').innerText,
                size: document.getElementById('itemSize').value,
                sleeve: document.getElementById('itemSleeve').value,
                collar: document.getElementById('itemCollar').value,
                image: "image/jersey2.jpg"
            };

            // This "Post-it note" is saved in the browser's brain
            localStorage.setItem('cartItem', JSON.stringify(productData));

            alert("Added " + productData.name + " to your cart!");
            window.location.href = 'cart.html';
        }
    </script>
</body>
</html>
